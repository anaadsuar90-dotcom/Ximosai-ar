<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcador XimosAI · Robot AR</title>
  <style>
    body {
      margin: 0;
      background: #e9eef1;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 760px;
      margin: auto;
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.16);
      border: 1px solid rgba(0,0,0,0.08);
    }

    h1 {
      margin: 8px 0 8px;
      font-size: 42px;
      letter-spacing: -1px;
    }

    .marca {
      color: #00aeca;
      font-weight: 800;
    }

    .nota {
      font-size: 18px;
      line-height: 1.45;
      color: #333;
      max-width: 620px;
      margin: 12px auto;
    }

    .marcador-wrap {
      margin: 18px auto;
      padding: 18px;
      background: #05080a;
      border-radius: 18px;
      border: 4px solid #00e5ff;
      box-shadow: 0 0 24px rgba(0,229,255,0.35);
      width: min(88vw, 500px);
    }

    .marcador-wrap img {
      width: 100%;
      height: auto;
      display: block;
      background: white;
    }

    .pie {
      background: #061014;
      color: white;
      border-radius: 15px;
      padding: 14px;
      margin-top: 16px;
      font-size: 18px;
    }

    .pie strong {
      color: #00ffff;
    }

    @media print {
      body { background: white; }
      .card { box-shadow: none; border: none; }
      .marcador-wrap { box-shadow: none; }
      .nota, .pie { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="marca">XimosAI</span> Robot AR</h1>

    <p class="nota">
      Abre la web del holograma en otro móvil, acepta la cámara y apunta a este marcador.
      Tiene que verse entero, con buena luz y sin reflejos.
    </p>

    <div class="marcador-wrap">
      <img
        src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png"
        alt="Marcador Hiro para AR.js"
      />
    </div>

    <div class="pie">
      Marcador de prueba para activar el robot de <strong>XimosAI</strong>
    </div>
  </div>
</body>
</html>
