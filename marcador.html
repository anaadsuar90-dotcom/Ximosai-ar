<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcador XimosAI</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #ebf0f2;
      font-family: Arial, Helvetica, sans-serif;
      color: #0e1113;
      text-align: center;
    }
    .card {
      max-width: 760px;
      margin: auto;
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.14);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 42px;
    }
    .brand {
      color: #00b8d4;
      font-weight: 800;
    }
    .note {
      font-size: 18px;
      line-height: 1.45;
      color: #334048;
      max-width: 630px;
      margin: 0 auto 18px;
    }
    .wrap {
      margin: 18px auto;
      width: min(88vw, 500px);
      border-radius: 18px;
      padding: 18px;
      background: #051014;
      border: 4px solid #00e5ff;
      box-shadow: 0 0 28px rgba(0,229,255,0.3);
    }
    img {
      width: 100%;
      display: block;
      background: white;
    }
    .footer {
      margin-top: 16px;
      background: #071418;
      color: white;
      border-radius: 14px;
      padding: 14px;
      font-size: 18px;
    }
    .footer strong {
      color: #00f0ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1><span class="brand">XimosAI</span> · Marcador AR</h1>
    <p class="note">
      Abre la web del robot en otro móvil, acepta la cámara y apunta a este marcador.
      Debe verse entero, con buena luz y sin reflejos.
    </p>
    <div class="wrap">
      <img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" alt="Marcador Hiro para AR.js" />
    </div>
    <div class="footer">
      Marcador de prueba para activar el robot de <strong>XimosAI</strong>
    </div>
  </div>
</body>
</html>
