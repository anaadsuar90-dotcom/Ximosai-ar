<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>XimosAI · Robot AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: transparent !important;
    }
    body { position: fixed; inset: 0; }
    video {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: -2 !important;
      background: #000 !important;
    }
    canvas {
      position: fixed !important;
      inset: 0 !important;
      z-index: -1 !important;
    }
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background: transparent !important;
    }
    #panel {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.58);
      color: #fff;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid rgba(0, 255, 255, 0.45);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.22);
      backdrop-filter: blur(5px);
      font-size: 14px;
      line-height: 1.35;
    }
    #panel strong {
      display: block;
      font-size: 18px;
      color: #00f0ff;
      margin-bottom: 6px;
    }
    .botones {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      margin-bottom: 8px;
    }
    button, a.boton {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      background: #00ddff;
      color: #001014;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    a.boton.secundario {
      background: rgba(255,255,255,0.92);
      color: #001014;
    }
    #status {
      color: #ccfbff;
      font-size: 13px;
    }
    #ayuda {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.45);
      color: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
    }
  </style>
  <script>
    let audioReady = false;
    let lastSpeakTime = 0;
    const mensajePublicidad = `
      Hola, soy el asistente virtual de XimosAI.
      La inteligencia artificial ya no es cosa del futuro.
      Puede ayudarte a crear contenido, mejorar tu trabajo,
      organizar tu empresa y ahorrar tiempo.
      Escanea, descubre y empieza a usar la inteligencia artificial de forma práctica.
    `;
    function setStatus(texto) {
      const s = document.getElementById("status");
      if (s) s.innerText = texto;
    }
    function hablar(texto) {
      if (!("speechSynthesis" in window)) {
        setStatus("Tu navegador no soporta voz automática.");
        return;
      }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(texto);
      u.lang = "es-ES";
      u.rate = 0.96;
      u.pitch = 1.02;
      u.volume = 1;
      window.speechSynthesis.speak(u);
    }
    function activarAudio() {
      audioReady = true;
      hablar("Audio activado. Apunta la cámara al marcador para ver a XimosAI.");
      setStatus("Audio activado. Apunta al marcador.");
    }
    function repetirMensaje() {
      audioReady = true;
      hablar(mensajePublicidad);
      setStatus("Mensaje reproducido.");
    }
    AFRAME.registerComponent("ximosai-robot-ar", {
      init: function () {
        const marker = this.el;
        marker.addEventListener("markerFound", function () {
          const ahora = Date.now();
          if (audioReady && ahora - lastSpeakTime > 18000) {
            lastSpeakTime = ahora;
            hablar(mensajePublicidad);
            setStatus("Marcador detectado. Robot XimosAI hablando.");
          } else if (!audioReady) {
            setStatus("Marcador detectado. Pulsa Activar audio para que hable.");
          } else {
            setStatus("Marcador detectado. Robot XimosAI activo.");
          }
        });
        marker.addEventListener("markerLost", function () {
          setStatus("Marcador perdido. Vuelve a apuntar al marcador.");
        });
      }
    });
  </script>
</head>
<body>
  <div id="panel">
    <strong>XimosAI · Robot AR</strong>
    1. Pulsa <b>Activar audio</b>.<br>
    2. Apunta la cámara al marcador.
    <div class="botones">
      <button onclick="activarAudio()">Activar audio</button>
      <button onclick="repetirMensaje()">Repetir mensaje</button>
      <a class="boton secundario" href="marcador.html" target="_blank">Ver marcador</a>
    </div>
    <div id="status">Esperando permiso de cámara y marcador...</div>
  </div>

  <div id="ayuda">El robot aparece justo encima del marcador</div>

  <a-scene
    embedded
    renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >
    <a-marker preset="hiro" ximosai-robot-ar>
      <a-entity position="0 0 0">

        <a-cylinder position="0 0.02 0" radius="0.65" height="0.06" material="color: #07171b; metalness: 0.35; roughness: 0.35"></a-cylinder>
        <a-torus position="0 0.06 0" radius="0.62" radius-tubular="0.03" material="color: #00eaff; emissive: #00eaff; emissiveIntensity: 0.9; transparent: true; opacity: 0.95" animation="property: rotation; to: 0 360 0; loop: true; dur: 5200; easing: linear"></a-torus>
        <a-ring position="0 0.065 0" rotation="-90 0 0" radius-inner="0.38" radius-outer="0.45" material="color: #ffffff; emissive: #00ffff; emissiveIntensity: 0.35; transparent: true; opacity: 0.55"></a-ring>

        <a-sphere position="0 0.95 0" radius="0.88" material="color: #00ffff; wireframe: true; transparent: true; opacity: 0.07" animation="property: rotation; to: 0 360 0; loop: true; dur: 11000; easing: linear"></a-sphere>

        <a-entity id="robot" position="0 0.44 0" animation="property: position; dir: alternate; dur: 1800; loop: true; to: 0 0.52 0; easing: easeInOutSine">
          <a-cylinder position="-0.13 -0.24 0" radius="0.045" height="0.26" material="color: #d9e4e8; metalness: 0.35; roughness: 0.25"></a-cylinder>
          <a-cylinder position="0.13 -0.24 0" radius="0.045" height="0.26" material="color: #d9e4e8; metalness: 0.35; roughness: 0.25"></a-cylinder>
          <a-sphere position="-0.13 -0.40 0.02" radius="0.08" scale="1.4 0.45 1" material="color: #ffffff; metalness: 0.25; roughness: 0.2"></a-sphere>
          <a-sphere position="0.13 -0.40 0.02" radius="0.08" scale="1.4 0.45 1" material="color: #ffffff; metalness: 0.25; roughness: 0.2"></a-sphere>
          <a-sphere position="0 0 0" radius="0.30" scale="1 1.18 0.78" material="color: #f7fbfc; metalness: 0.22; roughness: 0.18"></a-sphere>
          <a-sphere position="0 0.03 0.19" radius="0.16" scale="1.7 0.7 0.22" material="color: #081418; metalness: 0.2; roughness: 0.22"></a-sphere>
          <a-text value="XimosAI" position="-0.25 0.03 0.31" align="center" width="0.95" color="#00f0ff"></a-text>
          <a-sphere position="0 0.50 0" radius="0.26" scale="1.12 0.94 0.86" material="color: #f7fbfc; metalness: 0.22; roughness: 0.18"></a-sphere>
          <a-sphere position="0 0.51 0.18" radius="0.20" scale="1.25 0.72 0.18" material="color: #071114; metalness: 0.2; roughness: 0.18"></a-sphere>
          <a-sphere position="-0.07 0.54 0.29" radius="0.025" scale="0.75 1.35 0.3" material="color: #00f0ff; emissive: #00f0ff; emissiveIntensity: 2.5" animation="property: scale; dir: alternate; dur: 1100; loop: true; to: 0.75 0.7 0.3; easing: easeInOutSine"></a-sphere>
          <a-sphere position="0.07 0.54 0.29" radius="0.025" scale="0.75 1.35 0.3" material="color: #00f0ff; emissive: #00f0ff; emissiveIntensity: 2.5" animation="property: scale; dir: alternate; dur: 1200; loop: true; to: 0.75 0.7 0.3; easing: easeInOutSine"></a-sphere>
          <a-torus position="0 0.46 0.295" radius="0.06" radius-tubular="0.005" scale="1 0.5 0.18" material="color: #00f0ff; emissive: #00f0ff; emissiveIntensity: 1.6; transparent: true; opacity: 0.98"></a-torus>
          <a-cylinder position="0 0.78 0" radius="0.012" height="0.12" material="color: #00f0ff; emissive: #00f0ff; emissiveIntensity: 1.2"></a-cylinder>
          <a-sphere position="0 0.87 0" radius="0.038" material="color: #00f0ff; emissive: #00f0ff; emissiveIntensity: 2.1" animation="property: scale; dir: alternate; dur: 850; loop: true; to: 1.2 1.2 1.2; easing: easeInOutSine"></a-sphere>
          <a-sphere position="-0.28 0.51 0" radius="0.065" scale="0.55 1 1" material="color: #00dff5; metalness: 0.18; roughness: 0.18"></a-sphere>
          <a-sphere position="0.28 0.51 0" radius="0.065" scale="0.55 1 1" material="color: #00dff5; metalness: 0.18; roughness: 0.18"></a-sphere>
          <a-entity position="-0.30 0.10 0" rotation="0 0 20">
            <a-cylinder position="0 -0.13 0" radius="0.04" height="0.30" material="color: #d9e4e8; metalness: 0.35; roughness: 0.25"></a-cylinder>
            <a-sphere position="0 -0.30 0" radius="0.055" material="color: #ffffff; metalness: 0.25; roughness: 0.18"></a-sphere>
          </a-entity>
          <a-entity position="0.29 0.16 0" rotation="0 0 -35" animation="property: rotation; dir: alternate; dur: 900; loop: true; to: 0 0 -72; easing: easeInOutSine">
            <a-cylinder position="0 0.14 0" radius="0.04" height="0.31" material="color: #d9e4e8; metalness: 0.35; roughness: 0.25"></a-cylinder>
            <a-sphere position="0 0.32 0" radius="0.06" material="color: #ffffff; metalness: 0.25; roughness: 0.18"></a-sphere>
          </a-entity>
        </a-entity>

        <a-text value="XimosAI" position="-0.46 1.45 0" color="#00f0ff" width="2.2" align="center"></a-text>
        <a-text value="IA practica para empresas y personas" position="-0.79 1.28 0" color="#ffffff" width="1.85" align="center"></a-text>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
