<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>XimosAI · Robot AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    #panel {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.76);
      color: #fff;
      padding: 12px;
      border-radius: 15px;
      border: 1px solid rgba(0, 255, 255, 0.55);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.28);
      font-size: 14px;
      line-height: 1.35;
      backdrop-filter: blur(4px);
    }

    #panel strong {
      color: #00ffff;
      font-size: 16px;
    }

    .botones {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 9px;
    }

    button, a.boton {
      padding: 10px 12px;
      border: none;
      border-radius: 11px;
      background: #00e5ff;
      color: #001014;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 13px;
    }

    a.boton.secundario {
      background: #ffffff;
      color: #001014;
    }

    #status {
      margin-top: 8px;
      color: #b8ffff;
      font-size: 13px;
    }
  </style>

  <script>
    let audioReady = false;
    let lastSpeakTime = 0;

    const mensajePublicidad = `
      Hola, soy el asistente virtual de XimosAI.
      La inteligencia artificial ya no es cosa del futuro.
      Puede ayudarte a crear contenido, mejorar tu trabajo,
      organizar tu empresa y ahorrar tiempo.
      Escanea, descubre y empieza a usar la inteligencia artificial de forma práctica.
    `;

    function setStatus(texto) {
      const status = document.getElementById("status");
      if (status) status.innerText = texto;
    }

    function hablar(texto) {
      if (!("speechSynthesis" in window)) {
        setStatus("Este navegador no soporta voz automática.");
        return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(texto);
      utterance.lang = "es-ES";
      utterance.rate = 0.95;
      utterance.pitch = 1.08;
      utterance.volume = 1;

      window.speechSynthesis.speak(utterance);
    }

    function activarAudio() {
      audioReady = true;
      hablar("Audio activado. Apunta la cámara al marcador para ver al robot de XimosAI.");
      setStatus("Audio activado. Apunta al marcador.");
    }

    function repetirMensaje() {
      audioReady = true;
      hablar(mensajePublicidad);
      setStatus("Mensaje reproducido. Mantén el marcador enfocado.");
    }

    AFRAME.registerComponent("robot-ximosai-parlante", {
      init: function () {
        const marcador = this.el;

        marcador.addEventListener("markerFound", function () {
          const ahora = Date.now();

          if (audioReady && ahora - lastSpeakTime > 18000) {
            lastSpeakTime = ahora;
            hablar(mensajePublicidad);
            setStatus("Marcador detectado. Robot XimosAI hablando.");
          } else if (!audioReady) {
            setStatus("Marcador detectado. Pulsa Activar audio para que hable.");
          } else {
            setStatus("Marcador detectado. Robot XimosAI activo.");
          }
        });

        marcador.addEventListener("markerLost", function () {
          setStatus("Marcador perdido. Vuelve a enfocar el marcador completo.");
        });
      }
    });
  </script>
</head>

<body>
  <div id="panel">
    <strong>XimosAI · Robot AR</strong><br>
    1. Pulsa <b>Activar audio</b>.<br>
    2. Apunta la cámara al marcador.
    <div class="botones">
      <button onclick="activarAudio()">Activar audio</button>
      <button onclick="repetirMensaje()">Repetir mensaje</button>
      <a class="boton secundario" href="marcador.html" target="_blank">Ver marcador</a>
    </div>
    <div id="status">Esperando permiso de cámara y marcador...</div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
  >

    <a-marker preset="hiro" robot-ximosai-parlante>
      <a-entity position="0 0 0" rotation="-90 0 0" scale="0.92 0.92 0.92">

        <a-entity position="0 0.03 0">
          <a-torus
            radius="0.72"
            radius-tubular="0.025"
            material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 0.8; transparent: true; opacity: 0.9"
            animation="property: rotation; to: 0 0 360; loop: true; dur: 3600; easing: linear"
          ></a-torus>

          <a-torus
            radius="0.46"
            radius-tubular="0.012"
            material="color: #ffffff; emissive: #00ffff; emissiveIntensity: 0.5; transparent: true; opacity: 0.75"
            animation="property: rotation; to: 0 0 -360; loop: true; dur: 5000; easing: linear"
          ></a-torus>

          <a-cylinder
            radius="0.72"
            height="0.025"
            material="color: #00181c; transparent: true; opacity: 0.75"
          ></a-cylinder>
        </a-entity>

        <a-entity
          id="robot"
          position="0 0.48 0"
          animation="property: position; dir: alternate; dur: 1600; loop: true; to: 0 0.56 0; easing: easeInOutSine"
        >

          <a-cylinder
            position="-0.15 -0.26 0"
            radius="0.055"
            height="0.26"
            material="color: #d9e3e7; metalness: 0.4; roughness: 0.25"
          ></a-cylinder>

          <a-cylinder
            position="0.15 -0.26 0"
            radius="0.055"
            height="0.26"
            material="color: #d9e3e7; metalness: 0.4; roughness: 0.25"
          ></a-cylinder>

          <a-sphere
            position="-0.15 -0.42 0.02"
            radius="0.085"
            scale="1.25 0.45 0.9"
            material="color: #ffffff; metalness: 0.35; roughness: 0.25"
          ></a-sphere>

          <a-sphere
            position="0.15 -0.42 0.02"
            radius="0.085"
            scale="1.25 0.45 0.9"
            material="color: #ffffff; metalness: 0.35; roughness: 0.25"
          ></a-sphere>

          <a-sphere
            position="0 0.02 0"
            radius="0.32"
            scale="0.95 1.12 0.72"
            material="color: #ffffff; metalness: 0.25; roughness: 0.18"
          ></a-sphere>

          <a-sphere
            position="0 0.05 -0.235"
            radius="0.18"
            scale="1.35 0.55 0.12"
            material="color: #081316; metalness: 0.3; roughness: 0.22"
          ></a-sphere>

          <a-text
            value="XimosAI"
            position="-0.225 0.04 -0.34"
            rotation="0 0 0"
            color="#00ffff"
            width="0.95"
            align="center"
            material="transparent: true; opacity: 1"
          ></a-text>

          <a-sphere
            position="0 0.55 0"
            radius="0.29"
            scale="1.08 0.9 0.78"
            material="color: #f3f8fa; metalness: 0.28; roughness: 0.16"
          ></a-sphere>

          <a-sphere
            position="0 0.56 -0.215"
            radius="0.22"
            scale="1.15 0.62 0.12"
            material="color: #061014; metalness: 0.15; roughness: 0.2"
          ></a-sphere>

          <a-sphere
            position="-0.075 0.59 -0.305"
            radius="0.026"
            scale="0.75 1.35 0.28"
            material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 2.2"
            animation="property: scale; dir: alternate; dur: 900; loop: true; to: 0.75 0.8 0.28; easing: easeInOutSine"
          ></a-sphere>

          <a-sphere
            position="0.075 0.59 -0.305"
            radius="0.026"
            scale="0.75 1.35 0.28"
            material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 2.2"
            animation="property: scale; dir: alternate; dur: 950; loop: true; to: 0.75 0.8 0.28; easing: easeInOutSine"
          ></a-sphere>

          <a-torus
            position="0 0.50 -0.306"
            radius="0.065"
            radius-tubular="0.006"
            rotation="0 0 0"
            scale="1 0.45 0.12"
            material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 1.6; transparent: true; opacity: 0.95"
          ></a-torus>

          <a-cylinder
            position="0 0.83 0"
            radius="0.012"
            height="0.15"
            material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 1.3"
          ></a-cylinder>

          <a-sphere
            position="0 0.93 0"
            radius="0.04"
            material="color: #00ffff; emissive: #00ffff; emissiveIntensity: 2"
            animation="property: scale; dir: alternate; dur: 900; loop: true; to: 1.22 1.22 1.22; easing: easeInOutSine"
          ></a-sphere>

          <a-sphere
            position="-0.31 0.56 0"
            radius="0.08"
            scale="0.55 1 1"
            material="color: #00ffff; metalness: 0.25; roughness: 0.2"
          ></a-sphere>

          <a-sphere
            position="0.31 0.56 0"
            radius="0.08"
            scale="0.55 1 1"
            material="color: #00ffff; metalness: 0.25; roughness: 0.2"
          ></a-sphere>

          <a-entity position="-0.31 0.12 0" rotation="0 0 18">
            <a-cylinder
              position="0 -0.13 0"
              radius="0.045"
              height="0.31"
              material="color: #d9e3e7; metalness: 0.35; roughness: 0.22"
            ></a-cylinder>
            <a-sphere
              position="0 -0.31 0"
              radius="0.06"
              material="color: #ffffff; metalness: 0.35; roughness: 0.22"
            ></a-sphere>
          </a-entity>

          <a-entity
            position="0.31 0.18 0"
            rotation="0 0 -38"
            animation="property: rotation; dir: alternate; dur: 850; loop: true; to: 0 0 -75; easing: easeInOutSine"
          >
            <a-cylinder
              position="0 0.16 0"
              radius="0.042"
              height="0.34"
              material="color: #d9e3e7; metalness: 0.35; roughness: 0.22"
            ></a-cylinder>
            <a-sphere
              position="0 0.36 0"
              radius="0.065"
              material="color: #ffffff; metalness: 0.35; roughness: 0.22"
            ></a-sphere>
          </a-entity>

          <a-sphere
            position="0 0.18 0"
            radius="0.82"
            material="color: #00ffff; transparent: true; opacity: 0.075; wireframe: true"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"
          ></a-sphere>

        </a-entity>

        <a-entity position="0 1.55 0">
          <a-text
            value="XimosAI"
            position="-0.43 0 0"
            align="center"
            color="#00ffff"
            width="2.15"
            material="transparent: true; opacity: 0.98"
          ></a-text>

          <a-text
            value="IA practica para empresas y personas"
            position="-0.75 -0.16 0"
            align="center"
            color="#ffffff"
            width="1.75"
            material="transparent: true; opacity: 0.9"
          ></a-text>
        </a-entity>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
