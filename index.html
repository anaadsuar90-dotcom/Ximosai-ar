<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>XimosAI · Holograma AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    #panel {
      position: fixed;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.76);
      color: #fff;
      padding: 12px;
      border-radius: 15px;
      border: 1px solid rgba(0, 255, 255, 0.55);
      box-shadow: 0 0 24px rgba(0, 255, 255, 0.28);
      font-size: 14px;
      line-height: 1.35;
      backdrop-filter: blur(4px);
    }

    #panel strong {
      color: #00ffff;
      font-size: 16px;
    }

    .botones {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 9px;
    }

    button, a.boton {
      padding: 10px 12px;
      border: none;
      border-radius: 11px;
      background: #00e5ff;
      color: #001014;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 13px;
    }

    a.boton.secundario {
      background: #ffffff;
      color: #001014;
    }

    #status {
      margin-top: 8px;
      color: #b8ffff;
      font-size: 13px;
    }
  </style>

  <script>
    let audioReady = false;
    let lastSpeakTime = 0;

    const mensajePublicidad = `
      Hola, soy el asistente virtual de XimosAI.
      La inteligencia artificial ya no es cosa del futuro.
      Puede ayudarte a crear contenido, mejorar tu trabajo,
      organizar tu empresa y ahorrar tiempo.
      Escanea, descubre y empieza a usar la inteligencia artificial de forma práctica.
    `;

    function setStatus(texto) {
      const status = document.getElementById("status");
      if (status) status.innerText = texto;
    }

    function hablar(texto) {
      if (!("speechSynthesis" in window)) {
        setStatus("Este navegador no soporta voz automática.");
        return;
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(texto);
      utterance.lang = "es-ES";
      utterance.rate = 0.95;
      utterance.pitch = 1.05;
      utterance.volume = 1;

      window.speechSynthesis.speak(utterance);
    }

    function activarAudio() {
      audioReady = true;
      hablar("Audio activado. Apunta la cámara al marcador Hiro para ver el holograma de XimosAI.");
      setStatus("Audio activado. Apunta al marcador Hiro.");
    }

    function repetirMensaje() {
      audioReady = true;
      hablar(mensajePublicidad);
      setStatus("Mensaje reproducido. Mantén el marcador enfocado.");
    }

    AFRAME.registerComponent("holograma-parlante", {
      init: function () {
        const marcador = this.el;

        marcador.addEventListener("markerFound", function () {
          const ahora = Date.now();

          if (audioReady && ahora - lastSpeakTime > 18000) {
            lastSpeakTime = ahora;
            hablar(mensajePublicidad);
            setStatus("Marcador detectado. Holograma hablando.");
          } else if (!audioReady) {
            setStatus("Marcador detectado. Pulsa Activar audio para que hable.");
          } else {
            setStatus("Marcador detectado. Holograma activo.");
          }
        });

        marcador.addEventListener("markerLost", function () {
          setStatus("Marcador perdido. Vuelve a apuntar al Hiro completo.");
        });
      }
    });
  </script>
</head>

<body>
  <div id="panel">
    <strong>XimosAI · Holograma AR</strong><br>
    1. Pulsa <b>Activar audio</b>.<br>
    2. Apunta la cámara al marcador Hiro.
    <div class="botones">
      <button onclick="activarAudio()">Activar audio</button>
      <button onclick="repetirMensaje()">Repetir mensaje</button>
      <a class="boton secundario" href="marcador.html" target="_blank">Ver marcador Hiro</a>
    </div>
    <div id="status">Esperando permiso de cámara y marcador...</div>
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
  >
    <a-marker preset="hiro" holograma-parlante>
      <a-entity position="0 0 0" rotation="-90 0 0" scale="1 1 1">

        <a-torus
          position="0 0 0"
          radius="0.78"
          radius-tubular="0.016"
          material="color: #00ffff; transparent: true; opacity: 0.78; wireframe: true"
          animation="property: rotation; to: 0 0 360; loop: true; dur: 3000; easing: linear"
        ></a-torus>

        <a-torus
          position="0 0.025 0"
          radius="0.52"
          radius-tubular="0.012"
          material="color: #ffffff; transparent: true; opacity: 0.55; wireframe: true"
          animation="property: rotation; to: 0 0 -360; loop: true; dur: 4200; easing: linear"
        ></a-torus>

        <a-cylinder
          position="0 0.45 0"
          radius="0.25"
          height="0.56"
          material="color: #00ffff; transparent: true; opacity: 0.38; wireframe: true"
          animation="property: position; dir: alternate; dur: 1500; loop: true; to: 0 0.51 0; easing: easeInOutSine"
        ></a-cylinder>

        <a-sphere
          position="0 0.91 0"
          radius="0.24"
          material="color: #00ffff; transparent: true; opacity: 0.48; wireframe: true"
          animation="property: position; dir: alternate; dur: 1500; loop: true; to: 0 0.97 0; easing: easeInOutSine"
        ></a-sphere>

        <a-sphere
          position="-0.085 0.94 -0.19"
          radius="0.026"
          material="color: #ffffff; emissive: #00ffff; emissiveIntensity: 2"
        ></a-sphere>

        <a-sphere
          position="0.085 0.94 -0.19"
          radius="0.026"
          material="color: #ffffff; emissive: #00ffff; emissiveIntensity: 2"
        ></a-sphere>

        <a-cylinder
          position="-0.36 0.53 0"
          radius="0.035"
          height="0.48"
          rotation="0 0 35"
          material="color: #00ffff; transparent: true; opacity: 0.48; wireframe: true"
        ></a-cylinder>

        <a-cylinder
          position="0.36 0.53 0"
          radius="0.035"
          height="0.48"
          rotation="0 0 -35"
          material="color: #00ffff; transparent: true; opacity: 0.48; wireframe: true"
        ></a-cylinder>

        <a-sphere
          position="0 0.63 0"
          radius="0.8"
          material="color: #00ffff; transparent: true; opacity: 0.08; wireframe: true"
          animation="property: scale; dir: alternate; dur: 1800; loop: true; to: 1.12 1.12 1.12; easing: easeInOutSine"
        ></a-sphere>

        <a-text
          value="XimosAI"
          position="-0.45 1.3 0"
          align="center"
          color="#00ffff"
          width="2.25"
          material="transparent: true; opacity: 0.98"
        ></a-text>

        <a-text
          value="IA practica para empresas y personas"
          position="-0.77 1.13 0"
          align="center"
          color="#ffffff"
          width="1.9"
          material="transparent: true; opacity: 0.92"
        ></a-text>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
